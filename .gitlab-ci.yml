# Converted from GitHub Actions — eggs-gui

stages:
  - test

test:
  stage: test
  image: node:22
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths: [node_modules/]
  script:
    - npm install
    - npm run build || true
    - npm test || true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
